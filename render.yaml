services:
  - type: web
    name: amel-self55
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_TG_ID
        sync: false
      - key: OWNER_USERNAME
        sync: false
      - key: DATABASE_PATH
        value: "/tmp/amel.db"
      - key: PORT
        value: "10000"
    healthCheckPath: /health
    autoDeploy: true
